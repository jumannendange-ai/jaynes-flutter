workflows:
  android-release:
    name: JAYNES MAX TV - Android
    max_build_duration: 60
    environment:
      flutter: 3.22.3
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
