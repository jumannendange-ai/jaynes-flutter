workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons --verbose 2>&1 | tail -50
    artifacts:
      - "**/*.apk"
