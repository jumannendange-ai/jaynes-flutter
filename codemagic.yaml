workflows:
  flutter-android:
    name: Build Flutter APK
    instance_type: mac_mini_m1
    environment:
      flutter: 3.19.0
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
