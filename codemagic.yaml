workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: 3.41.5
    scripts:
      - name: Build APK
        script: |
          flutter pub get
          cd android && ./gradlew assembleRelease
          find . -name "*.apk" -type f
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
      - android/app/build/outputs/apk/**/*.apk
      - "**/*.apk"
