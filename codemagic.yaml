workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: 3.41.5
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons
      - name: Find APK
        script: find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
    artifacts:
      - "**/*.apk"
