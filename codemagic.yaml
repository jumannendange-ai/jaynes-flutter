workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: 3.29.0
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons 2>&1
      - name: Find APK
        script: find / -name "*.apk" 2>/dev/null || echo "No APK"
    artifacts:
      - "**/*.apk"
    publishing:
      email:
        recipients:
          - swajayfour4@gmail.com
        notify:
          success: true
          failure: true
