workflows:
  android-workflow:
    name: Build Flutter APK
    instance_type: linux_x2
    environment:
      flutter: latest
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
