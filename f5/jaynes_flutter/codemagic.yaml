workflows:
  android-workflow:
    name: Build Flutter APK
    instance_type: linux_x2
    environment:
      flutter: 3.19.0
      java: 17
    triggering:
      events:
        - push
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
