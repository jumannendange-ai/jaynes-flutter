workflows:
  android-workflow:
    name: Build Flutter APK
    instance_type: linux_x2
    environment:
      flutter: 3.19.0
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug --split-per-abi
    artifacts:
      - build/app/outputs/apk/debug/*.apk
