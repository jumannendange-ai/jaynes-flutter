name: jaynes_max_tv
description: JAYNES MAX TV - Tanzania Premium Streaming
publish_to: 'none'
version: 6.0.0+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video Player
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.3.6

  # HTTP
  http: ^1.2.0
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^4.2.1

  # Firebase
  firebase_core: ^3.4.1
  firebase_messaging: ^15.2.10

  # Utils
  url_launcher: ^6.2.5
  connectivity_plus: ^5.0.2
  wakelock_plus: ^1.1.4
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
